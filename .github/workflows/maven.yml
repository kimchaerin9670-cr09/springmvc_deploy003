# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ] #main 브렌치에서 Push 트리거
  pull_request:
    branches: [ "main" ] #main 브렌치에서 Pull Request가 생성되면 트리거

# 결국은 GitHub의 데이터를 가져와서 Build를 진행 => IaaS+Paas => OS가 필요
jobs:
  build:
    runs-on: ubuntu-latest #GitHub Actions 에서 실행항 운영체제

    steps: # 단계 별로 실행되는 workflow 이다

    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    #- name: Build with Maven
      #run: |
       # mvn clean package \
        #-DskipTests \
        #-f ./deploy003_SpringMVC/pom.xml

    - name: Deploy to Tomcat Server
      env:
        TOMCAT_USERNAME: ${{ secrets.TOMCAT_USERNAME }} # git secret의 TOMCAT 사용자 명 run에서 사용
        TOMCAT_PASSWORD: ${{ secrets.TOMCAT_PASSWORD }} # git secret의 TOMCAT 비밀번호 run에서 사용
        TOMCAT_URL: 'https://tartar-drilling-chasing.ngrok-free.dev/manager/text'

      run: |
        mvn tomcat:redeploy \
        -Dmaven.tomcat.url=$TOMCAT_URL \
        -Dmaven.tomcat.username=$TOMCAT_USERNAME \
        -Dmaven.tomcat.password=$TOMCAT_PASSWORD \
        -DskipTests \
        -f ./deploy003_SpringMVC/pom.xml

    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
    # - name: Update dependency graph
    #   uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
